<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师端 - 互动课堂控制</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #2C3E50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 5px;
        }

        /* Setup Section */
        .setup-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .setup-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            color: var(--dark);
            text-align: center;
        }

        .setup-card h3 {
            font-size: 14px;
            color: #6B7280;
            margin-bottom: 15px;
        }

        .game-code-display {
            font-size: 56px;
            font-weight: 900;
            letter-spacing: 10px;
            color: var(--primary);
            margin: 15px 0;
        }

        .qr-box {
            background: white;
            border-radius: 15px;
            padding: 15px;
            display: inline-block;
        }

        .player-count-large {
            font-size: 72px;
            font-weight: 900;
            color: var(--secondary);
        }

        .player-count-label {
            font-size: 16px;
            color: #6B7280;
        }

        /* Question Section */
        .question-section {
            background: white;
            border-radius: 25px;
            padding: 40px;
            color: var(--dark);
            min-height: 400px;
            display: none;
        }

        .question-section.active {
            display: block;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .question-num {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .timer-big {
            font-size: 48px;
            font-weight: 900;
            color: var(--primary);
        }

        .timer-big.warning {
            color: #DC2626;
            animation: pulse 0.5s infinite;
        }

        .play-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #FF6B6B 0%, #FFE66D 100%);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }

        .play-btn.playing {
            background: #DC2626;
        }

        .audio-player {
            margin-bottom: 25px;
            display: none;
        }

        .audio-player.active {
            display: block;
        }

        .progress-container {
            position: relative;
            height: 30px;
            background: #E5E7EB;
            border-radius: 15px;
            cursor: pointer;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(135deg, #4ECDC4 0%, #44a08d 100%);
            border-radius: 15px;
            width: 0%;
            transition: width 0.1s;
        }

        .time-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
            font-weight: 700;
            color: var(--dark);
            text-shadow: 0 0 3px white;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .question-text {
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            line-height: 1.5;
            margin-bottom: 35px;
            padding: 30px;
            background: #F3F4F6;
            border-radius: 15px;
            cursor: pointer;
        }

        .question-text .hidden-content {
            display: none;
        }

        .question-text.show .notice {
            display: none;
        }

        .question-text.show .hidden-content {
            display: block;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .option-item {
            background: #F3F4F6;
            border-radius: 15px;
            padding: 25px;
            font-size: 20px;
            font-weight: 600;
            border: 4px solid transparent;
            transition: all 0.3s;
        }

        .option-item.correct {
            background: #D1FAE5;
            border-color: #10B981;
            color: #065F46;
        }

        .option-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 10px;
            margin-right: 12px;
            font-weight: 900;
        }

        .option-item.correct .option-letter {
            background: #10B981;
            color: white;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 48px;
            font-weight: 900;
        }

        .stat-value.correct { color: #10B981; }
        .stat-value.wrong { color: #EF4444; }

        .stat-label {
            font-size: 14px;
            color: #6B7280;
        }

        /* Control Bar */
        .control-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .ctrl-btn {
            padding: 18px 40px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .ctrl-btn.primary {
            background: linear-gradient(135deg, #4ECDC4 0%, #44a08d 100%);
            color: white;
        }

        .ctrl-btn.primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(78, 205, 196, 0.4);
        }

        .ctrl-btn.secondary {
            background: #E5E7EB;
            color: var(--dark);
        }

        .ctrl-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Player List */
        .player-list-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
            color: var(--dark);
        }

        .player-list-section h3 {
            font-size: 16px;
            color: #6B7280;
            margin-bottom: 15px;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }

        .player-chip {
            background: #F3F4F6;
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-chip .name {
            font-weight: 600;
            font-size: 14px;
        }

        .player-chip .score {
            font-weight: 900;
            color: var(--secondary);
            font-size: 14px;
        }

        /* Waiting Screen */
        .waiting-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .waiting-overlay.hidden {
            display: none;
        }

        .waiting-card {
            background: white;
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            color: var(--dark);
            max-width: 500px;
        }

        .waiting-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .waiting-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 15px;
        }

        .waiting-hint {
            font-size: 16px;
            color: #6B7280;
            margin-bottom: 30px;
        }

        .waiting-code {
            font-size: 64px;
            font-weight: 900;
            letter-spacing: 15px;
            color: var(--primary);
            margin: 20px 0;
        }

        .waiting-qr {
            background: #F3F4F6;
            border-radius: 15px;
            padding: 20px;
            display: inline-block;
            margin: 20px 0;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
        }

        @media (max-width: 900px) {
            .setup-section {
                grid-template-columns: 1fr;
            }
            .options-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>互动课堂 - 教师端</h1>
            <p>第七课 · 听力理解练习</p>
        </div>

        <!-- Setup Cards -->
        <div class="setup-section">
            <div class="setup-card">
                <h3>游戏代码</h3>
                <div class="game-code-display" id="gameCode">----</div>
                <div class="qr-box">
                    <div id="qrcode"></div>
                </div>
                <p style="color: #6B7280; font-size: 14px; margin-top: 10px;">学生扫码加入</p>
            </div>

            <div class="setup-card">
                <h3>已加入人数</h3>
                <div class="player-count-large" id="playerCount">0</div>
                <div class="player-count-label">位同学已加入</div>
            </div>


        </div>

        <!-- Player List -->
        <div class="player-list-section">
            <h3>已加入的学生</h3>
            <div class="players-grid" id="playersGrid">
                <p style="color: #9CA3AF; grid-column: 1/-1; text-align: center;">等待学生加入...</p>
            </div>
        </div>

        <!-- Question Section -->
        <div class="question-section" id="questionSection">
            <div class="question-header">
                <div class="question-num" id="questionNum">第 1 题</div>
                <button class="play-btn" id="playBtn" onclick="playAudio()">▶ 播放听力</button>
                <div class="timer-big" id="timerDisplay">⏱ 15</div>
            </div>

            <!-- Audio Player -->
            <div class="audio-player" id="audioPlayer">
                <audio id="audioElement" src=""></audio>
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                    <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
                </div>
            </div>

            <div class="question-text" id="questionText" onclick="toggleQuestionText()">
                <div class="notice">👆 点击显示题目内容</div>
                <div class="hidden-content"></div>
            </div>

            <div class="options-grid" id="optionsGrid"></div>

            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-value correct" id="correctCount">0</div>
                    <div class="stat-label">正确</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value wrong" id="wrongCount">0</div>
                    <div class="stat-label">错误</div>
                </div>
            </div>

            <div class="control-bar">
                <button class="ctrl-btn secondary" id="prevBtn" onclick="prevQuestion()" style="display:none;">◀ 上一页</button>
                <button class="ctrl-btn secondary" id="stopAudioBtn" onclick="stopAudio()">⏹ 停止</button>
                <button class="ctrl-btn primary" id="nextBtn" onclick="nextQuestion()">▶ 下一题</button>
                <button class="ctrl-btn secondary" id="resultsBtn" onclick="showFinalResults()">🏆 最终结果</button>
            </div>
        </div>
    </div>

    <!-- Waiting Overlay -->
    <div class="waiting-overlay" id="waitingOverlay">
        <div class="waiting-card">
            <div class="waiting-icon">📱</div>
            <div class="waiting-title">等待学生加入</div>
            <div class="waiting-hint">请让学生扫描二维码或输入游戏代码加入</div>
            <div class="waiting-code" id="overlayCode">----</div>
            <div class="waiting-qr">
                <div id="overlayQrcode"></div>
            </div>
            <button class="ctrl-btn primary" id="startGameBtn" onclick="startGame()" disabled>
                开始游戏 (等待学生加入...)
            </button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-e4bjej0W0fwJ5qmXL30qRaBIJGPUUqc",
            authDomain: "listeningclass-7ab57.firebaseapp.com",
            databaseURL: "https://listeningclass-7ab57-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "listeningclass-7ab57",
            storageBucket: "listeningclass-7ab57.firebasestorage.app",
            messagingSenderId: "354373862045",
            appId: "1:354373862045:web:51f2ed597ce60c56a00a74",
            measurementId: "G-39LP3HJBE7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const questions = [
            { text: "不但我们喜欢流行歌曲，而且老师也喜欢。", options: ["我们不喜欢，老师喜欢", "我们喜欢，老师不喜欢", "我们和老师都喜欢", "我们和老师都不喜欢"], correct: 2 },
            { text: "他的汉语说得真棒，跟中国人一样。", options: ["他的汉语说得不好", "他的汉语说得很好", "他不是中国人", "他说话很慢"], correct: 1 },
            { text: "下课后我想去图书馆借本书。", options: ["他想去图书馆还书", "他想去图书馆看书", "他想去图书馆借书", "他想去图书馆工作"], correct: 2 },
            { text: "今天天气真冷，我穿了三件衣服还觉得冷。", options: ["今天很热", "今天很冷", "他只穿了一件衣服", "他觉得天气很好"], correct: 1 },
            { text: "我是从上个月开始学习游泳的。", options: ["我学习游泳一个月了", "我学习游泳很久了", "我从没学过游泳", "我上个月停止了游泳"], correct: 0 },
            { text: "这个问题太难了，没有人能回答。", options: ["这个问题很简单", "有人能回答这个问题", "没有人能回答这个问题", "大家都回答了这个问题"], correct: 2 },
            { text: "他虽然年纪小，但是懂得很多。", options: ["他年纪小，懂得也少", "他年纪大，懂得多", "他年纪小，但懂得多", "他年纪大，但懂得少"], correct: 2 },
            { text: "如果你有空的话，明天来我家玩吧。", options: ["明天你必须来我家", "明天你有空就来我家", "明天你不能来我家", "你明天没空就不能来"], correct: 1 },
            { text: "那家餐厅的菜又便宜又好吃。", options: ["那家餐厅的菜贵但好吃", "那家餐厅的菜便宜但不好吃", "那家餐厅的菜便宜又好吃", "那家餐厅的菜贵又难吃"], correct: 2 },
            { text: "我每天骑自行车上班，大概需要半小时。", options: ["我开车上班需要半小时", "我走路上班需要半小时", "我骑自行车上班需要半小时", "我坐车上班需要半小时"], correct: 2 }
        ];

        let gameCode = '';
        let currentQuestion = 0;
        let timerInterval = null;
        let gameRef = null;
        let audioPlaying = false;

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function generateGameCode() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        async function init() {
            gameCode = generateGameCode();
            document.getElementById('gameCode').textContent = gameCode;
            document.getElementById('overlayCode').textContent = gameCode;

            const joinUrl = window.location.origin + window.location.pathname.replace('teacher.html', 'student.html') + '?game=' + gameCode;

            // 生成二维码
            const qrcodeEl = document.getElementById('qrcode');
            const overlayQrEl = document.getElementById('overlayQrcode');
            
            if (qrcodeEl) {
                qrcodeEl.innerHTML = '';
                new QRCode(qrcodeEl, {
                    text: joinUrl,
                    width: 120,
                    height: 120
                });
            }
            
            if (overlayQrEl) {
                overlayQrEl.innerHTML = '';
                new QRCode(overlayQrEl, {
                    text: joinUrl,
                    width: 150,
                    height: 150
                });
            }

            window.history.replaceState({}, '', '?game=' + gameCode);

            gameRef = db.ref('games/' + gameCode);
            await gameRef.set({
                status: 'waiting',
                currentQuestion: -1,
                totalQuestions: questions.length,
                players: {},
                scores: {},
                answers: {},
                createdAt: Date.now()
            });

            gameRef.on('value', onGameUpdate);
        }

        function onGameUpdate(snapshot) {
            const data = snapshot.val();
            if (!data) return;

            const players = data.players || {};
            const playerCount = Object.keys(players).length;

            document.getElementById('playerCount').textContent = playerCount;

            const startBtn = document.getElementById('startGameBtn');
            if (playerCount > 0) {
                startBtn.disabled = false;
                startBtn.textContent = '开始游戏 (已有 ' + playerCount + ' 人)';
            } else {
                startBtn.disabled = true;
                startBtn.textContent = '开始游戏 (等待学生加入...)';
            }

            const playersGrid = document.getElementById('playersGrid');
            if (playerCount > 0) {
                playersGrid.innerHTML = Object.entries(players).map(([id, p]) => `
                    <div class="player-chip">
                        <span class="name">${p.name}</span>
                        <span class="score">${data.scores && data.scores[id] || 0}分</span>
                    </div>
                `).join('');
            } else {
                playersGrid.innerHTML = '<p style="color: #9CA3AF; grid-column: 1/-1; text-align: center;">等待学生加入...</p>';
            }
        }

        function startGame() {
            document.getElementById('waitingOverlay').classList.add('hidden');
            document.getElementById('questionSection').classList.add('active');
            currentQuestion = 0;
            showQuestion();
            showToast('游戏开始！');
        }

        function showQuestion() {
            if (currentQuestion >= questions.length) {
                showToast('所有题目已结束！');
                return;
            }

            document.getElementById('questionNum').textContent = `第 ${currentQuestion + 1} 题`;

            const q = questions[currentQuestion];
            document.querySelector('#questionText .hidden-content').textContent = q.text;
            document.getElementById('questionText').classList.remove('show');

            document.getElementById('optionsGrid').innerHTML = q.options.map((opt, idx) => `
                <div class="option-item" data-index="${idx}">
                    <span class="option-letter">${String.fromCharCode(65 + idx)}</span>
                    ${opt}
                </div>
            `).join('');

            document.getElementById('correctCount').textContent = '0';
            document.getElementById('wrongCount').textContent = '0';

            // 显示/隐藏上一页按钮
            document.getElementById('prevBtn').style.display = currentQuestion > 0 ? 'inline-block' : 'none';

            // 开始正计时
            startTimer();

            if (gameRef) {
                gameRef.update({
                    status: 'playing',
                    currentQuestion: currentQuestion
                });
            }

            currentQuestion++;
        }

        function prevQuestion() {
            if (currentQuestion <= 1) return;
            currentQuestion -= 2;
            showQuestion();
        }

        function toggleQuestionText() {
            const el = document.getElementById('questionText');
            el.classList.toggle('show');
        }

        let audioElement = null;
        let audioUrl = '';

        function playAudio() {
            const btn = document.getElementById('playBtn');
            const audioPlayer = document.getElementById('audioPlayer');

            if (!audioElement) {
                audioElement = document.getElementById('audioElement');
            }

            // 如果没有设置音频URL，提示用户
            if (!audioUrl) {
                showToast('请先设置听力音频URL');
                return;
            }

            if (audioPlaying) {
                audioElement.pause();
                audioPlaying = false;
                btn.textContent = '▶ 播放听力';
                btn.classList.remove('playing');
            } else {
                audioElement.play();
                audioPlaying = true;
                btn.textContent = '⏸ 暂停';
                btn.classList.add('playing');
                audioPlayer.classList.add('active');
            }
        }

        function stopAudio() {
            if (audioElement) {
                audioElement.pause();
                audioElement.currentTime = 0;
            }
            audioPlaying = false;
            const btn = document.getElementById('playBtn');
            btn.textContent = '▶ 播放听力';
            btn.classList.remove('playing');
        }

        function setAudioUrl(url) {
            audioUrl = url;
            if (audioElement) {
                audioElement.src = url;
            }
            showToast('音频已设置');
        }

        // 初始化音频进度条
        function initAudioProgress() {
            const audio = document.getElementById('audioElement');
            const progressBar = document.getElementById('progressBar');
            const progressContainer = document.getElementById('progressContainer');
            const timeDisplay = document.getElementById('timeDisplay');

            if (!audio) return;

            audio.addEventListener('timeupdate', () => {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = percent + '%';

                const currentMin = Math.floor(audio.currentTime / 60);
                const currentSec = Math.floor(audio.currentTime % 60);
                const durationMin = Math.floor(audio.duration / 60) || 0;
                const durationSec = Math.floor(audio.duration % 60) || 0;
                timeDisplay.textContent = `${currentMin}:${currentSec.toString().padStart(2, '0')} / ${durationMin}:${durationSec.toString().padStart(2, '0')}`;
            });

            audio.addEventListener('ended', () => {
                audioPlaying = false;
                const btn = document.getElementById('playBtn');
                btn.textContent = '▶ 播放听力';
                btn.classList.remove('playing');
                progressBar.style.width = '0%';
                // 音频播放结束后开始倒计时
                startTimer();
            });

            // 点击进度条跳转
            progressContainer.addEventListener('click', (e) => {
                const rect = progressContainer.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                audio.currentTime = percent * audio.duration;
            });
        }

        function nextQuestion() {
            showQuestion();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);

            let elapsed = 0;
            const timerEl = document.getElementById('timerDisplay');
            timerEl.textContent = '⏱ 0秒';
            timerEl.classList.remove('warning');

            timerInterval = setInterval(() => {
                elapsed++;
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                timerEl.textContent = `⏱ ${mins}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function endQuestion() {
            if (timerInterval) clearInterval(timerInterval);
            const q = questions[currentQuestion - 1];
            document.querySelectorAll('.option-item')[q.correct].classList.add('correct');
            showToast('本题结束！');
        }

        // 页面加载完成后初始化
        window.onload = function() {
            init();
            initAudioProgress();
        };

        async function showFinalResults() {
            await gameRef.update({ status: 'finished' });
            const data = (await gameRef.once('value')).val();

            const scores = data.scores || {};
            const players = data.players || {};

            const rankings = Object.entries(scores)
                .map(([id, score]) => ({ name: players[id]?.name || '未知', score }))
                .sort((a, b) => b.score - a.score)
                .slice(0, 5);

            alert('🏆 最终结果 🏆\n\n' + rankings.map((p, i) => `第${i+1}名: ${p.name} - ${p.score}分`).join('\n'));
        }

        // window.onload = init;  // removed to avoid duplicate
    </script>
</body>
</html>
