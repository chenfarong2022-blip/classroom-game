<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生端 - 互动课堂</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #2C3E50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 0;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .join-form {
            background: white;
            border-radius: 25px;
            padding: 30px;
            color: var(--dark);
        }

        .game-code-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            margin-bottom: 25px;
            color: white;
        }

        .game-code-box h3 { font-size: 14px; opacity: 0.9; margin-bottom: 10px; }
        .game-code { font-size: 48px; font-weight: 900; letter-spacing: 8px; }

        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 16px;
        }
        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            font-size: 18px;
            font-family: inherit;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .join-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #FF6B6B 0%, #FFE66D 100%);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .join-btn:hover { transform: translateY(-2px); }
        .join-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .waiting-screen {
            display: none;
            text-align: center;
            padding: 40px 0;
        }
        .waiting-screen.active { display: block; }

        .waiting-icon { font-size: 80px; margin-bottom: 20px; }
        .waiting-text { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
        .waiting-hint { font-size: 16px; opacity: 0.7; }

        .player-info {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
            color: var(--dark);
        }
        .player-info h4 { font-size: 14px; color: #6B7280; margin-bottom: 10px; }
        .your-name { font-size: 28px; font-weight: 700; color: var(--primary); }

        .question-screen { display: none; }
        .question-screen.active { display: block; }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 20px;
            color: var(--dark);
        }
        .question-info .lesson { font-size: 18px; font-weight: 700; }
        .question-info .score { font-size: 14px; color: #6B7280; margin-top: 5px; }

        .timer {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary);
            background: #FFF5F5;
            padding: 10px 20px;
            border-radius: 12px;
        }
        .timer.warning {
            background: #FEE2E2;
            color: #DC2626;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .question-content {
            background: white;
            border-radius: 25px;
            padding: 30px;
            color: var(--dark);
        }

        .question-text {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .show-question-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            margin-bottom: 15px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            padding: 20px;
            border: 3px solid #E5E7EB;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            background: white;
            font-family: inherit;
            text-align: left;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }
        .option-btn:hover:not(.disabled):not(.selected) {
            border-color: var(--primary);
            background: #FFF5F5;
        }
        .option-btn.selected {
            border-color: var(--primary);
            background: linear-gradient(135deg, #FF6B6B 0%, #FFE66D 100%);
            color: white;
        }
        .option-btn.correct {
            border-color: #10B981;
            background: #D1FAE5;
            color: #065F46;
        }
        .option-btn.wrong {
            border-color: #EF4444;
            background: #FEE2E2;
            color: #991B1B;
        }
        .option-btn.disabled { opacity: 0.6; cursor: not-allowed; }

        .option-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: #F3F4F6;
            border-radius: 8px;
            margin-right: 12px;
            font-weight: 700;
        }
        .option-btn.selected .option-letter { background: rgba(255,255,255,0.3); }

        /* TF Question Styles */
        .tf-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }
        .tf-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background: white;
            border: 3px solid #E5E7EB;
            border-radius: 15px;
            transition: all 0.2s;
        }
        .tf-item:hover:not(.disabled) {
            border-color: var(--primary);
        }
        .tf-statement {
            font-size: 14px;
            font-weight: 500;
            flex: 1;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
            padding-right: 10px;
        }
        .tf-buttons {
            display: flex;
            gap: 10px;
        }
        .tf-btn {
            padding: 10px 25px;
            border: 3px solid #E5E7EB;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: white;
            transition: all 0.2s;
        }
        .tf-btn.true:hover:not(.disabled) { border-color: #10B981; background: #D1FAE5; }
        .tf-btn.false:hover:not(.disabled) { border-color: #EF4444; background: #FEE2E2; }
        .tf-btn.selected-true { border-color: #10B981; background: #D1FAE5; color: #065F46; }
        .tf-btn.selected-false { border-color: #EF4444; background: #FEE2E2; color: #991B1B; }
        .tf-btn.correct { border-color: #10B981; background: #D1FAE5; color: #065F46; }
        .tf-btn.incorrect { border-color: #EF4444; background: #FEE2E2; color: #991B1B; }
        .tf-item.disabled { opacity: 0.6; }

        /* Match Question Styles */
        .match-container {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            width: 100%;
            padding: 20px;
        }
        .match-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .match-label {
            font-size: 14px;
            font-weight: bold;
            color: #6B7280;
            margin-bottom: 5px;
            text-align: center;
        }
        .match-item {
            padding: 15px 20px;
            background: white;
            border: 3px solid #E5E7EB;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .match-item:hover:not(.disabled):not(.selected) {
            border-color: var(--primary);
            background: #FFF5F5;
        }
        .match-item.selected-left {
            border-color: var(--primary);
            background: linear-gradient(135deg, #FF6B6B 0%, #FFE66D 100%);
            color: white;
        }
        .match-item.selected-right {
            border-color: var(--secondary);
            background: linear-gradient(135deg, #4ECDC4 0%, #44A08D 100%);
            color: white;
        }
        .match-item.correct {
            border-color: #10B981;
            background: #D1FAE5;
            color: #065F46;
        }
        .match-item.wrong {
            border-color: #EF4444;
            background: #FEE2E2;
            color: #991B1B;
        }
        .match-item.disabled { opacity: 0.6; cursor: not-allowed; }
        .match-item.matched {
            border-color: #10B981;
            background: #D1FAE5;
        }
        .match-hint {
            text-align: center;
            color: #6B7280;
            font-size: 14px;
            margin-top: 10px;
        }

        .result-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .result-overlay.active { display: flex; }

        .result-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            color: var(--dark);
            max-width: 350px;
            width: 90%;
        }

        .result-icon { font-size: 80px; margin-bottom: 20px; }
        .result-text { font-size: 28px; font-weight: 900; margin-bottom: 10px; }
        .result-text.correct { color: #10B981; }
        .result-text.wrong { color: #EF4444; }
        .result-points { font-size: 24px; color: #6B7280; }
        .result-score { font-size: 48px; font-weight: 900; color: var(--primary); margin: 15px 0; }
        .result-ranking { font-size: 18px; color: #6B7280; margin-top: 10px; }

        .continue-hint {
            margin-top: 20px;
            font-size: 14px;
            color: #9CA3AF;
        }

        .submit-btn {
            transition: all 0.3s;
        }
        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
        }
        .submit-btn:disabled {
            background: #E5E7EB;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .final-screen {
            display: none;
            text-align: center;
            padding: 40px 0;
        }
        .final-screen.active { display: block; }

        .final-title {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 30px;
            color: var(--accent);
        }

        .final-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B6B 0%, #FFE66D 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin: 0 auto 20px;
        }

        .final-name { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
        .final-score { font-size: 48px; font-weight: 900; color: var(--accent); }
        .final-rank { font-size: 20px; color: rgba(255,255,255,0.7); margin-top: 10px; }

        .medal { font-size: 60px; margin-bottom: 10px; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .loading.active { display: block; }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌟 互动课堂 🌟</h1>
            <p>第七课 · 听力理解练习</p>
        </div>

        <div class="join-form" id="joinForm">
            <div class="input-group" id="gameCodeGroup">
                <label>🎮 游戏代码</label>
                <input type="text" id="gameCodeInput" placeholder="请输入4位游戏代码" maxlength="4" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            </div>

            <div class="input-group">
                <label>👤 您的昵称</label>
                <input type="text" id="playerName" placeholder="请输入昵称（2-8字）" maxlength="8">
            </div>

            <button class="join-btn" id="joinBtn" onclick="joinGame()">
                🚀 加入游戏
            </button>
        </div>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>连接中...</p>
        </div>

        <div class="waiting-screen" id="waitingScreen">
            <div class="waiting-icon">📱</div>
            <div class="waiting-text">已加入成功！</div>
            <div class="waiting-hint">等待老师开始答题...</div>

            <div class="player-info">
                <h4>您的昵称</h4>
                <div class="your-name" id="yourName">--</div>
            </div>
        </div>

        <div class="question-screen" id="questionScreen">
            <div class="question-header">
                <div class="question-info">
                    <div class="lesson">📖 第 <span id="questionNum">1</span> 题</div>
                    <div class="score">得分: <span id="currentScore">0</span></div>
                </div>
                <div class="timer" id="timer">⏱ 0:00</div>
            </div>

            <div class="question-content">
                <div class="question-text" id="questionText"></div>
                <div class="options-grid" id="optionsGrid"></div>
                <button class="submit-btn" id="submitBtn" onclick="submitAnswer()" style="display:none; margin-top: 20px; width: 100%; padding: 15px; font-size: 18px; background: linear-gradient(135deg, #FF6B6B 0%, #FFE66D 100%); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold;">提交答案</button>
                <div class="waiting-hint" id="waitingHint" style="display:none; text-align: center; color: #6B7280; margin-top: 15px; font-size: 16px;">✅ 已提交，等待老师公布结果...</div>
            </div>
        </div>

        <div class="final-screen" id="finalScreen">
            <div class="final-title">🏆 游戏结束 🏆</div>
            <div class="medal" id="finalMedal">🥇</div>
            <div class="final-avatar">👤</div>
            <div class="final-name" id="finalName">--</div>
            <div class="final-score" id="finalScore">0</div>
            <div class="final-rank" id="finalRank">最终排名第 --</div>
        </div>
    </div>

    <div class="result-overlay" id="resultOverlay">
        <div class="result-card">
            <div class="result-icon" id="resultIcon">✅</div>
            <div class="result-text" id="resultText">回答正确！</div>
            <div class="result-points" id="resultPoints">+100 分</div>
            <div class="result-score" id="resultScore">300</div>
            <div class="result-ranking" id="resultRanking">当前排名第 5</div>
            <div class="continue-hint">等待下一题...</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-e4bjej0W0fwJ5qmXL30qRaBIJGPUUqc",
            authDomain: "listeningclass-7ab57.firebaseapp.com",
            databaseURL: "https://listeningclass-7ab57-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "listeningclass-7ab57",
            storageBucket: "listeningclass-7ab57.firebasestorage.app",
            messagingSenderId: "354373862045",
            appId: "1:354373862045:web:51f2ed597ce60c56a00a74",
            measurementId: "G-39LP3HJBE7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const questions = [
            { type: "choice", context: `麦克还在睡觉。妈妈说："麦克，起床吧，差十分钟八点了。" 问：现在几点？`, options: ["八点十分", "七点五十", "八点五十", "七点十分"], correct: 1 },
            { type: "choice", context: `麦克说："我原来想在这儿学习半年，现在觉得汉语很有意思，所以我准备再延长一年。" 问：麦克最后打算在这儿学习多长时间？`, options: ["半年", "一年", "一年半", "两年"], correct: 2 },
            { type: "choice", context: `王丽说："这套房子每月的房租是三千块，没有对面的那套便宜。" 问：对面那套房子的房租可能是多少钱？`, options: ["三千五百块", "三千块", "两千五百块", "四千块"], correct: 3 },
            { type: "choice", context: `妈妈说："我让你每天只看一个小时的电视，你不能再看了。" 问：他为什么现在不能看电视了？`, options: ["他不喜欢看电视", "电视坏了", "一个小时的时间到了", "他该去睡觉了"], correct: 2 },
            { type: "choice", context: `女的说："坐火车才四百多块。坐飞机的话，比坐火车贵八百多块呢。" 问：坐飞机的票价大概是多少钱？`, options: ["四百块", "八百块", "一千两百块", "一千六百块"], correct: 2 },
            { type: "choice", context: `老师说："北京今天的气温是十度，上海今天比北京高两度。" 问：上海今天多少度？`, options: ["八度", "十度", "十二度", "二度"], correct: 2 },
            { type: "choice", context: `一位老人说："我二十八岁跟她结婚，到现在都一起生活了三十几年了。" 问：他现在大概多大年纪？`, options: ["二十八岁", "三十岁", "五十岁", "差不多六十岁"], correct: 3 },
            { type: "choice", context: `男的说："我买东西还是喜欢去大商场，大商场的东西比小商店的好得多。" 问：男的是什么意思？`, options: ["大商场的东西太贵了", "大商场的东西质量更好", "他不喜欢买东西", "小商店的东西比大商场好"], correct: 1 },
            { type: "choice", context: `爷爷说："抽烟对身体不好，我从来不抽；喝酒嘛，少喝点儿对身体还是不错的。" 问：关于爷爷的习惯，下面哪个是对的？`, options: ["爷爷抽烟，不喝酒", "爷爷不抽烟，喝一点儿酒", "爷爷又抽烟又喝酒", "爷爷不抽烟，也不喝酒"], correct: 1 },
            { type: "choice", context: `山田说："飞机票我半年以前就买好了。早一点儿买的话，会便宜很多。" 问：山田为什么半年前就买票？`, options: ["怕买不到票", "为了省钱，因为早买便宜", "他想早点回国", "朋友让他早点买"], correct: 1 }
        ];

        let gameCode = '';
        let playerId = '';
        let playerName = '';
        let currentScore = 0;
        let hasAnswered = false;
        let timerInterval = null;
        let gameRef = null;
        let currentQuestionIndex = -1;

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('game');
            if (code) {
                gameCode = code;
                document.getElementById('gameCodeInput').value = code;
                document.getElementById('gameCodeGroup').style.display = 'none';
            }
        };

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function showScreen(screenId) {
            document.getElementById('joinForm').style.display = 'none';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('loading').classList.remove('active');
            document.getElementById('waitingScreen').classList.remove('active');
            document.getElementById('waitingScreen').style.display = 'none';
            document.getElementById('questionScreen').classList.remove('active');
            document.getElementById('questionScreen').style.display = 'none';
            document.getElementById('finalScreen').classList.remove('active');
            document.getElementById('finalScreen').style.display = 'none';
            
            if (screenId) {
                const el = document.getElementById(screenId);
                el.style.display = 'block';
                if (screenId === 'loading') {
                    el.classList.add('active');
                }
            }
        }

        async function joinGame() {
            const name = document.getElementById('playerName').value.trim();
            if (name.length < 2) {
                showToast('请输入2-8字的昵称');
                return;
            }

            const codeInput = document.getElementById('gameCodeInput').value.trim();
            if (!gameCode && !codeInput) {
                showToast('请输入4位游戏代码');
                return;
            }
            if (codeInput) {
                gameCode = codeInput;
            }

            if (gameCode === '----' || !gameCode || gameCode.length !== 4) {
                showToast('请输入4位游戏代码');
                return;
            }

            playerName = name;
            showScreen('loading');

            try {
                gameRef = db.ref('games/' + gameCode);
                const snapshot = await gameRef.once('value');
                const gameData = snapshot.val();

                if (!gameData) {
                    showToast('游戏不存在或已结束');
                    showScreen('joinForm');
                    return;
                }

                if (gameData.status === 'finished') {
                    showToast('游戏已结束');
                    showScreen('joinForm');
                    return;
                }

                playerId = 'p_' + Date.now();
                const playerRef = db.ref('games/' + gameCode + '/players/' + playerId);
                await playerRef.set({ name: playerName });

                const scoreRef = db.ref('games/' + gameCode + '/scores/' + playerId);
                await scoreRef.set(0);

                document.getElementById('yourName').textContent = playerName;
                showScreen('waitingScreen');
                showToast('加入成功！');

                // 监听游戏状态变化
                gameRef.on('value', onGameUpdate, (error) => {
                    console.error('Firebase listener error:', error);
                    showToast('连接断开，正在重连...');
                });

            } catch (error) {
                console.error('Join error:', error);
                showToast('网络错误，请检查连接');
                showScreen('joinForm');
            }
        }

        function onGameUpdate(snapshot) {
            const data = snapshot.val();
            if (!data) {
                console.log('Firebase data is null');
                return;
            }

            console.log('Status:', data.status, 'CurrentQuestion:', data.currentQuestion);

            if (data.status === 'finished') {
                showFinalResult(data);
                return;
            }

            if (data.status === 'playing') {
                if (data.currentQuestion >= 0 && data.currentQuestion !== currentQuestionIndex) {
                    console.log('Student updating to question:', data.currentQuestion);
                    currentQuestionIndex = data.currentQuestion;
                    hasAnswered = false;
                    selectedAnswer = -1;
                    tfAnswers = {};
                    matchPairs = {};
                    matchSelections = { left: -1, right: -1 };
                    showQuestion(data.currentQuestion);
                } else if (data.currentQuestion === -1) {
                    console.log('Waiting for first question...');
                }

                if (data.revealedAnswers && data.revealedAnswers[currentQuestionIndex]) {
                    const q = questions[currentQuestionIndex];
                    let canReveal = false;
                    if (q.type === 'choice' && hasAnswered && selectedAnswer !== -1) canReveal = true;
                    if (q.type === 'tf' && hasAnswered && Object.keys(tfAnswers).length === q.items.length) canReveal = true;
                    if (q.type === 'match' && hasAnswered && Object.keys(matchPairs).length === q.left.length) canReveal = true;
                    
                    if (canReveal) {
                        revealResult(currentQuestionIndex);
                    }
                }
            } else if (data.status === 'waiting') {
                console.log('Game is waiting for teacher to start...');
            }
        }

        function showQuestion(qIndex) {
            showScreen('questionScreen');
            document.getElementById('resultOverlay').classList.remove('active');
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('waitingHint').style.display = 'none';

            const q = questions[qIndex];
            document.getElementById('questionNum').textContent = qIndex + 1;
            document.getElementById('currentScore').textContent = currentScore;
            document.getElementById('questionText').textContent = q.context || q.text;

            const optionsGrid = document.getElementById('optionsGrid');
            
            if (q.type === 'choice') {
                optionsGrid.innerHTML = q.options.map((opt, idx) => `
                    <button class="option-btn" onclick="selectChoice(${idx})">
                        <span class="option-letter">${String.fromCharCode(65 + idx)}</span>
                        ${opt}
                    </button>
                `).join('');
            } else if (q.type === 'tf') {
                optionsGrid.innerHTML = `
                    <div class="tf-container">
                        ${q.items.map((item, idx) => `
                            <div class="tf-item" data-tf-idx="${idx}">
                                <span class="tf-statement">${item.statement}</span>
                                <div class="tf-buttons">
                                    <button class="tf-btn true" onclick="selectTF(${idx}, true)">True</button>
                                    <button class="tf-btn false" onclick="selectTF(${idx}, false)">False</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (q.type === 'match') {
                optionsGrid.innerHTML = `
                    <div class="match-container">
                        <div class="match-column">
                            <div class="match-label">左边的词</div>
                            ${q.left.map((item, idx) => `
                                <div class="match-item" data-match-left="${idx}" onclick="selectMatchLeft(${idx})">${item}</div>
                            `).join('')}
                        </div>
                        <div class="match-column">
                            <div class="match-label">右边的解释</div>
                            ${q.right.map((item, idx) => `
                                <div class="match-item" data-match-right="${idx}" onclick="selectMatchRight(${idx})">${item}</div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="match-hint">请先点击左边的词，再点击右边对应的解释</div>
                `;
            }

            startTimer();
        }

        // For TF and Match, we need to track multiple answers
        let tfAnswers = {};
        let matchSelections = { left: -1, right: -1 };
        let matchPairs = {};

        function selectChoice(answer) {
            if (hasAnswered) return;

            const options = document.querySelectorAll('.option-btn');
            options.forEach(opt => {
                opt.classList.remove('selected');
                opt.classList.remove('disabled');
            });
            options[answer].classList.add('selected');
            selectedAnswer = answer;

            document.getElementById('submitBtn').style.display = 'block';
        }

        function selectTF(idx, value) {
            if (hasAnswered) return;
            if (tfAnswers[idx] !== undefined) return;

            tfAnswers[idx] = value;
            const tfItem = document.querySelector(`.tf-item[data-tf-idx="${idx}"]`);
            const trueBtn = tfItem.querySelector('.tf-btn.true');
            const falseBtn = tfItem.querySelector('.tf-btn.false');

            if (value === true) {
                trueBtn.classList.add('selected-true');
                falseBtn.classList.remove('selected-false');
            } else {
                falseBtn.classList.add('selected-false');
                trueBtn.classList.remove('selected-true');
            }

            checkAllTFAnswered();
        }

        function checkAllTFAnswered() {
            const q = questions[currentQuestionIndex];
            if (q.type !== 'tf') return;

            const allAnswered = q.items.every((item, idx) => tfAnswers[idx] !== undefined);
            if (allAnswered) {
                document.getElementById('submitBtn').style.display = 'block';
            }
        }

        function selectMatchLeft(idx) {
            if (hasAnswered) return;
            if (matchPairs[idx] !== undefined) return;

            document.querySelectorAll('.match-item[data-match-left]').forEach(item => {
                item.classList.remove('selected-left');
            });
            const item = document.querySelector(`.match-item[data-match-left="${idx}"]`);
            item.classList.add('selected-left');
            matchSelections.left = idx;

            tryMatch();
        }

        function selectMatchRight(idx) {
            if (hasAnswered) return;

            document.querySelectorAll('.match-item[data-match-right]').forEach(item => {
                item.classList.remove('selected-right');
            });
            const item = document.querySelector(`.match-item[data-match-right="${idx}"]`);
            item.classList.add('selected-right');
            matchSelections.right = idx;

            tryMatch();
        }

        function tryMatch() {
            if (matchSelections.left !== -1 && matchSelections.right !== -1) {
                matchPairs[matchSelections.left] = matchSelections.right;

                const leftItem = document.querySelector(`.match-item[data-match-left="${matchSelections.left}"]`);
                const rightItem = document.querySelector(`.match-item[data-match-right="${matchSelections.right}"]`);

                leftItem.classList.remove('selected-left');
                rightItem.classList.remove('selected-right');
                leftItem.classList.add('disabled');
                rightItem.classList.add('disabled');
                leftItem.classList.add('matched');
                rightItem.classList.add('matched');

                matchSelections = { left: -1, right: -1 };

                const q = questions[currentQuestionIndex];
                if (Object.keys(matchPairs).length === q.left.length) {
                    document.getElementById('submitBtn').style.display = 'block';
                }
            }
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            
            let elapsed = 0;
            const timerEl = document.getElementById('timer');
            timerEl.textContent = '⏱ 0:00';
            timerEl.classList.remove('warning');

            timerInterval = setInterval(() => {
                elapsed++;
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                timerEl.textContent = `⏱ ${mins}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        let selectedAnswer = -1;

        function selectAnswer(answer) {
            if (hasAnswered) return;

            const options = document.querySelectorAll('.option-btn');
            options.forEach(opt => {
                opt.classList.remove('selected');
                opt.classList.remove('disabled');
            });
            options[answer].classList.add('selected');
            selectedAnswer = answer;

            document.getElementById('submitBtn').style.display = 'block';
        }

        async function submitAnswer() {
            if (hasAnswered) return;
            hasAnswered = true;

            if (timerInterval) clearInterval(timerInterval);

            const qIndex = currentQuestionIndex;
            const q = questions[qIndex];
            let isCorrect = false;
            let answerData = {};

            if (q.type === 'choice') {
                if (selectedAnswer === -1) return;
                document.querySelectorAll('.option-btn').forEach(opt => opt.classList.add('disabled'));
                isCorrect = selectedAnswer === q.correct;
                answerData = { type: 'choice', answer: selectedAnswer, isCorrect };
            } else if (q.type === 'tf') {
                const tfKeys = Object.keys(tfAnswers);
                if (tfKeys.length !== q.items.length) return;
                document.querySelectorAll('.tf-item').forEach(item => item.classList.add('disabled'));
                
                let correctCount = 0;
                q.items.forEach((item, idx) => {
                    if (tfAnswers[idx] === item.correct) correctCount++;
                });
                isCorrect = correctCount === q.items.length;
                answerData = { type: 'tf', answers: tfAnswers, isCorrect };
            } else if (q.type === 'match') {
                const matchKeys = Object.keys(matchPairs);
                if (matchKeys.length !== q.left.length) return;
                document.querySelectorAll('.match-item').forEach(item => item.classList.add('disabled'));
                
                let correctCount = 0;
                q.left.forEach((item, idx) => {
                    if (matchPairs[idx] === q.correct[idx]) correctCount++;
                });
                isCorrect = correctCount === q.left.length;
                answerData = { type: 'match', pairs: matchPairs, isCorrect };
            }

            const pointsEarned = isCorrect ? 100 : 0;
            if (isCorrect) {
                currentScore += pointsEarned;
            }

            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('waitingHint').style.display = 'block';

            const answerRef = db.ref('games/' + gameCode + '/answers/' + qIndex + '/' + playerId);
            await answerRef.set({
                ...answerData,
                timeUsed: parseInt(document.getElementById('timer').textContent.replace('⏱ ', ''))
            });

            const scoreRef = db.ref('games/' + gameCode + '/scores/' + playerId);
            await scoreRef.set(currentScore);
        }

        function revealResult(qIndex) {
            if (!hasAnswered) return;

            const q = questions[qIndex];
            let isCorrect = false;

            if (q.type === 'choice') {
                if (selectedAnswer === -1) return;
                isCorrect = selectedAnswer === q.correct;
                const options = document.querySelectorAll('.option-btn');
                if (!isCorrect) {
                    options[selectedAnswer].classList.remove('selected');
                    options[selectedAnswer].classList.add('wrong');
                    options[q.correct].classList.add('correct');
                } else {
                    options[selectedAnswer].classList.add('correct');
                }
            } else if (q.type === 'tf') {
                isCorrect = true;
                q.items.forEach((item, idx) => {
                    const tfItem = document.querySelector(`.tf-item[data-tf-idx="${idx}"]`);
                    const userAnswer = tfAnswers[idx];
                    const trueBtn = tfItem.querySelector('.tf-btn.true');
                    const falseBtn = tfItem.querySelector('.tf-btn.false');
                    
                    if (userAnswer === item.correct) {
                        (userAnswer ? trueBtn : falseBtn).classList.add('correct');
                    } else {
                        (userAnswer ? trueBtn : falseBtn).classList.add('incorrect');
                        (item.correct ? trueBtn : falseBtn).classList.add('correct');
                        isCorrect = false;
                    }
                });
            } else if (q.type === 'match') {
                isCorrect = true;
                q.left.forEach((item, idx) => {
                    const leftItem = document.querySelector(`.match-item[data-match-left="${idx}"]`);
                    const rightItem = document.querySelector(`.match-item[data-match-right="${matchPairs[idx]}"]`);
                    
                    if (matchPairs[idx] === q.correct[idx]) {
                        leftItem.classList.add('correct');
                        rightItem.classList.add('correct');
                    } else {
                        leftItem.classList.add('wrong');
                        rightItem.classList.add('wrong');
                        isCorrect = false;
                    }
                });
            }

            const pointsEarned = isCorrect ? 100 : 0;
            document.getElementById('waitingHint').style.display = 'none';

            showResultOverlay({
                isCorrect: isCorrect,
                pointsEarned: pointsEarned,
                totalScore: currentScore
            });
        }

        function timeUp() {
            if (hasAnswered) return;
            hasAnswered = true;

            const options = document.querySelectorAll('.option-btn');
            options.forEach(opt => opt.classList.add('disabled'));

            const q = questions[currentQuestionIndex];
            options[q.correct].classList.add('correct');
        }

        function showResultOverlay(data) {
            const overlay = document.getElementById('resultOverlay');
            
            document.getElementById('resultIcon').textContent = data.isCorrect ? '✅' : '❌';
            document.getElementById('resultText').textContent = data.isCorrect ? '回答正确！' : '回答错误';
            document.getElementById('resultText').className = 'result-text ' + (data.isCorrect ? 'correct' : 'wrong');
            document.getElementById('resultPoints').textContent = data.isCorrect ? '+100 分' : '+0 分';
            document.getElementById('resultScore').textContent = data.totalScore;
            document.getElementById('resultRanking').textContent = '当前排名第 --';

            overlay.classList.add('active');

            setTimeout(() => {
                overlay.classList.remove('active');
                document.getElementById('currentScore').textContent = currentScore;
            }, 3000);
        }

        async function showFinalResult(data) {
            const scores = data.scores || {};
            const players = data.players || {};

            const rankings = Object.entries(scores)
                .map(([id, score]) => ({ id, name: players[id]?.name || '未知', score }))
                .sort((a, b) => b.score - a.score);

            const myRank = rankings.findIndex(p => p.id === playerId) + 1;

            showScreen('finalScreen');
            document.getElementById('finalScore').textContent = currentScore;
            document.getElementById('finalRank').textContent = '最终排名第 ' + myRank;

            if (myRank <= 3) {
                document.getElementById('finalMedal').textContent = ['🥇', '🥈', '🥉'][myRank - 1];
            } else {
                document.getElementById('finalMedal').textContent = '🎉';
            }
        }
    </script>
</body>
</html>
